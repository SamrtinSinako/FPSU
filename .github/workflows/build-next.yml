name: Build Next

on:
  push:
    branches: [ next ]
    paths: [ 'app/**', 'apd/**', 'fpd/**', '.github/workflows/build-next.yml' ]
  pull_request:
    branches: [ next ]
    paths: [ 'app/**', 'apd/**', 'fpd/**', '.github/workflows/build-next.yml' ]
  workflow_dispatch:

env:
  KEYSTORE_FILE: debug.keystore
  KEYSTORE_PASSWORD: android
  KEY_ALIAS: androiddebugkey
  KEY_PASSWORD: android

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build-env

      - run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          SHORT="${GITHUB_SHA::7}"
          APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          [ -n "$APK" ] && mv "$APK" "FolkPatch-Next-${SHORT}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: folkpatch-next-${{ github.sha }}
          path: FolkPatch-Next-*.apk
          retention-days: 7
